site_name: Andrea Rubbi Docs
site_url: https://docs.andrearubbi.com/
site_description: Documentation hub for Andrea Rubbi's projects
site_author: Andrea Rubbi

repo_name: AndreaRubbi/andrearubbi-docs
repo_url: https://github.com/AndreaRubbi/andrearubbi-docs

use_directory_urls: true

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Projects:
    - GGE: gge/index.md
    - MixFlow: mixflow/index.md
    - Pear: pear/index.md
    - ContextualizedML: contextualized/readme.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/AndreaRubbi
