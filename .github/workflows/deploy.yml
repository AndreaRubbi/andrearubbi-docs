name: Deploy Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

# =============================================================================
# CONFIGURATION: Add/remove projects here
# =============================================================================
env:
  # Format: "owner/repo:subpath" (comma-separated)
  # owner/repo = Full GitHub repo path
  # subpath = folder name under docs/
  PROJECTS: "AndreaRubbi/GGE:gge,AndreaRubbi/SP-FM:mixflow,AndreaRubbi/Pear-EBI:pear,AndreaRubbi/contextualized:contextualized"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout docs hub
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install mkdocs-material pymdown-extensions

      - name: Sync project docs
        run: |
          # Parse projects from env variable
          IFS=',' read -ra PROJECT_LIST <<< "$PROJECTS"
          
          for project in "${PROJECT_LIST[@]}"; do
            # Split "owner/repo:subpath"
            IFS=':' read -r repo subpath <<< "$project"
            repo_name=$(basename "$repo")
            
            echo "::group::Syncing $repo → docs/$subpath/"
            
            # Clone the project repo (shallow clone)
            git clone --depth 1 \
              "https://github.com/${repo}.git" "_repos/${repo_name}" 2>/dev/null || {
              echo "⚠️  Could not clone $repo - creating placeholder"
              mkdir -p "docs/${subpath}"
              cat > "docs/${subpath}/index.md" << EOF
          # ${repo_name}
          
          !!! warning "Documentation not available"
              The documentation for this project is not yet available.
              
              Please check back later or visit the [GitHub repository](https://github.com/${repo}).
          EOF
              echo "::endgroup::"
              continue
            }
            
            # Copy docs if they exist
            if [ -d "_repos/${repo_name}/docs" ]; then
              mkdir -p "docs/${subpath}"
              cp -r "_repos/${repo_name}/docs/"* "docs/${subpath}/" 2>/dev/null || true
              
              # Ensure index.md exists (check for readme.md as fallback)
              if [ ! -f "docs/${subpath}/index.md" ]; then
                if [ -f "docs/${subpath}/readme.md" ] || [ -f "docs/${subpath}/README.md" ]; then
                  # Rename README to index if no index exists
                  mv "docs/${subpath}/"[Rr][Ee][Aa][Dd][Mm][Ee].md "docs/${subpath}/index.md" 2>/dev/null || true
                else
                  cat > "docs/${subpath}/index.md" << EOF
          # ${repo_name}
          
          !!! info "Index page missing"
              This project has documentation but no \`index.md\` file.
              
              Please add an \`index.md\` to the project's \`docs/\` folder.
          EOF
                fi
              fi
              echo "✅ Synced $repo docs"
            # Check for root README.md as fallback
            elif [ -f "_repos/${repo_name}/README.md" ] || [ -f "_repos/${repo_name}/readme.md" ]; then
              mkdir -p "docs/${subpath}"
              cp "_repos/${repo_name}/"[Rr][Ee][Aa][Dd][Mm][Ee].md "docs/${subpath}/readme.md" 2>/dev/null || true
              echo "✅ Synced $repo README.md"
            else
              echo "⚠️  No docs/ folder in $repo - creating placeholder"
              mkdir -p "docs/${subpath}"
              cat > "docs/${subpath}/index.md" << EOF
          # ${repo_name}
          
          !!! warning "Documentation not available"
              This project does not have a \`docs/\` folder yet.
              
              Please visit the [GitHub repository](https://github.com/${repo}) for more information.
          EOF
            fi
            
            echo "::endgroup::"
          done
          
          # Cleanup
          rm -rf _repos

      - name: Build MkDocs site
        run: mkdocs build --strict

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
